name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["phase/1-setup", "main"]

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            espeak-ng \
            libgl1 \
            libglib2.0-0

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip "setuptools<81"
          # openai-whisper builds from sdist and needs setuptools<81 at build time
          pip install --no-build-isolation openai-whisper
          pip install -r requirements.txt
          pip install -e .

      - name: Run unit tests
        run: pytest tests/unit/ -m "not slow" -q --tb=short

      - name: Run contract tests
        run: pytest tests/contract/ -q --tb=short

      - name: Run integration tests
        run: pytest tests/integration/ -q --tb=short

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for hardcoded secrets
        run: |
          # Fail if any staged/committed file contains secret-shaped strings
          if git diff --name-only HEAD~1..HEAD 2>/dev/null | xargs grep -lE \
            'AKIA[0-9A-Z]{16}|ghp_[0-9A-Za-z]{36}|sk_live_[0-9A-Za-z]{24}' \
            2>/dev/null; then
            echo "::error::Potential secrets detected — review the files above"
            exit 1
          fi
          echo "Secret scan: clean"
