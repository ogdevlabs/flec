name: Build

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (build but do not upload)"
        required: false
        default: "true"
        type: boolean

jobs:
  build-package:
    name: Build Python package
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install build tools
        run: pip install build wheel

      - name: Build sdist and wheel
        run: python -m build

      - name: Check package metadata
        run: |
          pip install twine
          twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/
          retention-days: 30

  verify-install:
    name: Verify installable on clean env
    runs-on: ubuntu-latest
    needs: build-package

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends espeak-ng libgl1 libglib2.0-0

      - name: Download built artifact
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ github.ref_name }}
          path: dist/

      - name: Install from wheel
        run: |
          pip install --upgrade pip "setuptools<81"
          pip install --no-build-isolation openai-whisper
          pip install dist/*.whl

      - name: Smoke import
        run: python -c "import flec; print('flec import OK')"
